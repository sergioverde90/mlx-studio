<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>New Chat</span>
                </button>
            </div>
            <div id="conversations-list" class="conversations-list"></div>
            <div id="sidebar-footer">
                <button id="settings-btn" class="sidebar-btn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <main id="main">
            <header id="topbar">
                <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <span id="current-model">local</span>
            </header>

            <div id="chat-container">
                <div id="welcome-screen">
                    <div class="welcome-content">
                        <h1>T<label style="color: #b8860b;">.</label>A<label style="color:#b8860b;">.</label>R<label style="color: #b8860b;">.</label>S</h1>
                        <p class="welcome-subtitle">A local AI assistant</p>
                        <p class="welcome-message">I'm here to help you with anything you need. What would you like to work on today?</p>
                    </div>
                </div>
                <div id="messages"></div>
            </div>

            <div id="input-area">
                <div id="input-wrapper">
                    <textarea id="message-input" placeholder="Ask anything..." rows="1" autocomplete="off"></textarea>
                    <button id="api-url-toggle-btn" class="api-url-toggle-btn" title="Toggle API URL">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                        </svg>
                    </button>
                    <button id="thinking-toggle-btn" class="thinking-toggle-btn" title="Toggle thinking">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a8 8 0 0 0-8 8c0 3.97 2.87 7.27 6.67 7.92A1.5 1.5 0 0 0 12 21.5a1.5 1.5 0 0 0 .33-2.58C16.13 17.27 20 13.97 20 10a8 8 0 0 0-8-8z"></path>
                            <path d="M9 18h6"></path>
                            <path d="M10 22h4"></path>
                        </svg>
                    </button>
                    <button id="send-btn" class="send-btn" disabled title="Send">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                    <button id="stop-btn" class="stop-btn hidden" title="Stop">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="1.5"></rect>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">TARS can make mistakes. Verify important information.</p>
            </div>
        </main>
    </div>

    <div id="settings-overlay" class="overlay hidden">
        <div id="settings-panel">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="close-settings" class="close-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="settings-body">

                <div class="setting-group">
                    <label for="setting-system-prompt">System Prompt</label>
                    <textarea id="setting-system-prompt" placeholder="Enter system prompt..." rows="3"></textarea>
                </div>
                <div class="setting-group">
                    <label for="setting-temperature">Temperature</label>
                    <input type="number" id="setting-temperature" min="0" max="2" step="0.1">
                </div>
                <div class="setting-group">
                    <label for="setting-min-p">Min P</label>
                    <input type="number" id="setting-min-p" min="0" max="1" step="0.01">
                </div>
                <div class="setting-group">
                    <label for="setting-presence-penalty">Presence Penalty</label>
                    <input type="number" id="setting-presence-penalty" min="-2" max="2" step="0.1">
                </div>
                <div class="setting-group">
                    <label for="setting-repeat-penalty">Repeat Penalty</label>
                    <input type="number" id="setting-repeat-penalty" min="0" max="2" step="0.05">
                </div>
                <div class="setting-group">
                    <label for="setting-thinking-budget">Thinking Budget Tokens</label>
                    <input type="number" id="setting-thinking-budget" min="0">
                </div>
                <div class="setting-group">
