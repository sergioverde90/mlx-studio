<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <button id="new-chat-btn" class="new-chat-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>
            <div id="conversations-list"></div>
            <div id="sidebar-footer">
                <button id="settings-btn" class="sidebar-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    Settings
                </button>
            </div>
        </aside>

        <main id="main">
            <div id="topbar">
                <button id="sidebar-toggle" class="sidebar-toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <span id="current-model">local</span>
            </div>

            <div id="chat-container">
                <div id="welcome-screen">
                    <h1>TARS</h1>
                    <p>Local AI Chat</p>
                </div>
                <div id="messages"></div>
            </div>

            <div id="input-area">
                <div id="input-wrapper">
                    <textarea id="message-input" placeholder="Ask anything..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                    <button id="stop-btn" class="stop-btn hidden">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="1.5"></rect>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">TARS can make mistakes. Check important info.</p>
            </div>
        </main>
    </div>

    <div id="settings-overlay" class="overlay hidden">
        <div id="settings-panel">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="close-settings" class="close-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="settings-body">
                <div class="setting-group">
                    <label>API Base URL</label>
                    <input type="url" id="setting-api-url" placeholder="http://localhost:8080/v1/chat/completions">
                </div>
                <div class="setting-group">
                    <label>System Prompt</label>
                    <textarea id="setting-system-prompt" placeholder="Enter system prompt..." rows="3"></textarea>
                </div>
                <div class="setting-group">
                    <label>Temperature</label>
                    <input type="number" id="setting-temperature" min="0" max="2" step="0.1">
                </div>
                <div class="setting-group">
                    <label>Min P</label>
                    <input type="number" id="setting-min-p" min="0" max="1" step="0.01">
                </div>
                <div class="setting-group">
                    <label>Presence Penalty</label>
                    <input type="number" id="setting-presence-penalty" min="-2" max="2" step="0.1">
                </div>
                <div class="setting-group">
                    <label>Repeat Penalty</label>
                    <input type="number" id="setting-repeat-penalty" min="0" max="2" step="0.05">
                </div>
                <div class="setting-group">
                    <label>Thinking Budget Tokens</label>
                    <input type="number" id="setting-thinking-budget" min="0">
                </div>
                <div class="setting-group">
                    <label>
                        <input type="checkbox" id="setting-enable-thinking">
                        Enable Thinking
                    </label>
                </div>
            </div>
            <div class="settings-footer">
                <button id="save-settings" class="save-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
